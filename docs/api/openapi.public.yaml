                - limit
                - offset
                - total_count
            type: object
        AssetView:
            properties:
                created_at:
                    example: "2025-04-29T12:34:56Z"
                    format: date-time
                    readOnly: true
                    type: string
                deleted_at:
                    example: "2025-04-29T12:34:56Z"
                    format: date-time
                    nullable: true
                    readOnly: true
                    type: string
                description:
                    nullable: true
                    type: string
                external_key:
