        asset.UpdateAssetRequest:
            properties:
                current_location_external_key:
                    example: WHS-01
                    maxLength: 255
                    minLength: 1
                    type: string
                current_location_id:
                    example: 42
                    type: integer
                description:
                    maxLength: 1024
                    type: string
                external_key:
                    maxLength: 255
                    minLength: 1
                    type: string
                is_active:
                    type: boolean
                metadata:
                    additionalProperties: true
                    type: object
                name:
                    maxLength: 255
                    minLength: 1
                    type: string
                valid_from:
                    example: "2025-01-01T00:00:00Z"
                    format: date-time
