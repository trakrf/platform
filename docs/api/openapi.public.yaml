                    type: string
                location_id:
                    example: 42
                    format: int32
                    maximum: 2147483647
                    minimum: 1
                    nullable: true
                    type: integer
                metadata:
                    additionalProperties: {}
                    nullable: true
                    type: object
                name:
                    maxLength: 255
                    minLength: 1
                    pattern: ^[^\x00-\x08\x0B\x0C\x0E-\x1F\x7F]*$
                    type: string
                tags:
                    items:
                        $ref: '#/components/schemas/TagRequest'
                    nullable: true
                    type: array
                valid_from:
                    example: "2025-01-01T00:00:00Z"
                    format: date-time
                    nullable: true
                    type: string
                valid_to:
                    example: "2026-01-01T00:00:00Z"
                    format: date-time
                    nullable: true
                    type: string
            required:
                - name
            type: object
        CreateLocationResponse:
            properties:
                data:
                    $ref: '#/components/schemas/LocationView'
            required:
                - data
            type: object
        CreateLocationWithTagsRequest:
            additionalProperties: false
            not:
                required:
                    - parent_id
                    - parent_external_key
            properties:
                description:
                    example: Main warehouse location
                    maxLength: 1024
                    minLength: 1
                    nullable: true
                    pattern: ^[^\x00-\x08\x0B\x0C\x0E-\x1F\x7F]*$
                    type: string
                external_key:
                    description: |-
                        external_key is optional. Omit to receive a server-assigned key in the
                        format LOC-NNNN (per-organization sequence), parallel to assets'
                        ASSET-NNNN behavior. When supplied, must satisfy the external_key_pattern.
                    example: wh1
                    maxLength: 255
                    minLength: 1
                    pattern: ^[A-Za-z0-9-]+$
                    type: string
                is_active:
                    example: true
                    nullable: true
                    type: boolean
                name:
                    example: Warehouse 1
                    maxLength: 255
                    minLength: 1
                    pattern: ^[^\x00-\x08\x0B\x0C\x0E-\x1F\x7F]*$
                    type: string
                parent_external_key:
                    example: wh1
                    maxLength: 255
                    minLength: 1
                    nullable: true
                    pattern: ^[A-Za-z0-9-]+$
                    type: string
                parent_id:
