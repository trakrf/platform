                    type: integer
                valid_from:
                    example: "2025-12-14T00:00:00Z"
                    format: date-time
                    type: string
                valid_to:
                    example: "2026-12-14T00:00:00Z"
                    format: date-time
                    type: string
            type: object
        locations.AddTagResponse:
            properties:
                data:
                    $ref: '#/components/schemas/shared.Tag'
            required:
                - data
            type: object
        locations.CreateLocationResponse:
