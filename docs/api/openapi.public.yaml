    /api/v1/reports/asset-locations:
        get:
            description: |-
                **Required scope:** `tracking:read`

                Snapshot of each asset's most recent location, filterable by canonical id or external_key. Because this view is derived from immutable scan history, it can resolve references for assets that have since been deleted. By default those rows are excluded; pass `include_deleted=true` to include them, and check `asset_deleted_at` to distinguish deleted from live.

                Temporal validity is applied to both joined entities. Assets whose effective window is past or future are excluded entirely. Locations whose effective window is past or future surface with null `location_id` / `location_external_key` while the parent asset row remains visible. Soft-deleted locations are projected the same way here — null on the report row — even though the identifier still lives on the location row; reports endpoints intentionally hide tombstoned anchor points from scan-derived summaries. Use the locations endpoint with `include_deleted=true` to retrieve the underlying identifier.
            operationId: getAssetLocations
            parameters:
                - description: max 200
                  in: query
                  name: limit
                  schema:
                    default: 50
                    maximum: 200
                    minimum: 1
                    type: integer
                - description: min 0
                  in: query
                  name: offset
                  schema:
                    default: 0
                    maximum: 2147483647
                    minimum: 0
                    type: integer
                - description: filter by location id (canonical, may repeat)
                  explode: true
                  in: query
                  name: location_id
                  schema:
                    default: []
                    items:
                        maximum: 2147483647
                        minimum: 1
                        type: integer
                    type: array
                  style: form
                - description: filter by location external_key (may repeat)
                  explode: true
                  in: query
                  name: location_external_key
                  schema:
                    default: []
                    items:
                        pattern: ^[^\x00-\x08\x0B\x0C\x0E-\x1F\x7F]*$
                        type: string
                    type: array
                  style: form
                - description: substring search (case-insensitive) on asset name, external_key, and active tag values
                  in: query
                  name: q
                  schema:
                    pattern: ^[^\x00-\x08\x0B\x0C\x0E-\x1F\x7F]*$
                    type: string
                - description: include rows for soft-deleted assets
                  in: query
                  name: include_deleted
                  schema:
                    default: false
                    type: boolean
                - description: comma-separated sort fields; prefix '-' for DESC
                  explode: false
                  in: query
                  name: sort
                  schema:
                    default: ""
                    pattern: ^(|(?:last_seen|-last_seen|asset_external_key|-asset_external_key|location_external_key|-location_external_key)(?:,(?:last_seen|-last_seen|asset_external_key|-asset_external_key|location_external_key|-location_external_key))*)$
                    type: string
                  style: form
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AssetLocationsResponse'
                    description: OK
                    headers:
                        X-RateLimit-Limit:
                            $ref: '#/components/headers/XRateLimitLimit'
                        X-RateLimit-Remaining:
                            $ref: '#/components/headers/XRateLimitRemaining'
                        X-RateLimit-Reset:
                            $ref: '#/components/headers/XRateLimitReset'
                        X-Request-Id:
                            $ref: '#/components/headers/XRequestId'
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Bad Request
                    headers:
                        X-RateLimit-Limit:
                            $ref: '#/components/headers/XRateLimitLimit'
                        X-RateLimit-Remaining:
                            $ref: '#/components/headers/XRateLimitRemaining'
                        X-RateLimit-Reset:
                            $ref: '#/components/headers/XRateLimitReset'
                        X-Request-Id:
                            $ref: '#/components/headers/XRequestId'
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Unauthorized
                    headers:
                        WWW-Authenticate:
                            $ref: '#/components/headers/WWWAuthenticate'
                        X-RateLimit-Limit:
                            $ref: '#/components/headers/XRateLimitLimit'
                        X-RateLimit-Remaining:
                            $ref: '#/components/headers/XRateLimitRemaining'
                        X-RateLimit-Reset:
