        BearerAuth:
            description: Session JWT for internal endpoints (platform frontend uses this).
            in: header
            name: Authorization
            type: apiKey
info:
    contact:
        email: support@trakrf.id
        name: TrakRF Support
    description: TrakRF public REST API. See docs.trakrf.id/api for the customer-facing reference.
    license:
        name: Business Source License 1.1
        url: https://github.com/trakrf/platform/blob/main/LICENSE
    title: TrakRF Internal API — not for customer use
    version: v1
openapi: 3.0.3
paths:
    /api/v1/assets:
        get:
            description: Get a paginated list of all assets with their tag identifiers
            parameters:
                - description: 'Number of assets to return (default: 10)'
                  in: query
                  name: limit
                  schema:
                    default: 10
                    minimum: 1
                    type: integer
                - description: 'Number of assets to skip for pagination (default: 0)'
                  in: query
                  name: offset
                  schema:
                    default: 0
                    minimum: 0
                    type: integer
            responses:
                "202":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/internal_handlers_assets.ListAssetsResponse'
                    description: Paginated list of assets with metadata
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_errors.ErrorResponse'
                    description: Internal server error
            security:
                - BearerAuth: []
            summary: List assets
            tags:
                - assets
        post:
            description: Create a new asset, optionally with tag identifiers
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_asset.CreateAssetWithIdentifiersRequest'
                description: Asset to create with optional identifiers
                required: true
                x-originalParamName: request
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                additionalProperties: true
                                type: object
                    description: 'data: asset.AssetView'
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_errors.ErrorResponse'
                    description: Invalid JSON or validation error
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_errors.ErrorResponse'
                    description: Internal server error
            security:
                - BearerAuth: []
            summary: Create asset
            tags:
                - assets
    /api/v1/assets/{id}:
        delete:
            description: Soft delete an asset by ID
            parameters:
                - description: Asset ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: integer
            responses:
                "202":
                    content:
                        application/json:
                            schema:
                                additionalProperties:
                                    type: boolean
                                type: object
                    description: 'deleted: true/false'
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_errors.ErrorResponse'
                    description: Invalid asset ID
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_errors.ErrorResponse'
                    description: Internal server error
            security:
                - BearerAuth: []
            summary: Delete asset
            tags:
                - assets
        get:
            description: Get an asset by ID with its tag identifiers
            parameters:
                - description: Asset ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: integer
            responses:
                "202":
                    content:
                        application/json:
                            schema:
                                additionalProperties: true
                                type: object
                    description: 'data: asset.AssetView'
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_errors.ErrorResponse'
                    description: Invalid asset ID
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_errors.ErrorResponse'
                    description: Asset not found
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_errors.ErrorResponse'
                    description: Internal server error
            security:
                - BearerAuth: []
            summary: Get asset
            tags:
                - assets
        put:
            description: Update an existing asset by ID
            parameters:
                - description: Asset ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: integer
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_asset.UpdateAssetRequest'
                description: Asset update data
                required: true
                x-originalParamName: request
            responses:
                "202":
                    content:
                        application/json:
                            schema:
                                additionalProperties: true
                                type: object
                    description: 'data: asset.Asset'
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_errors.ErrorResponse'
                    description: Invalid ID, JSON, or validation error
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_errors.ErrorResponse'
                    description: Internal server error
            security:
                - BearerAuth: []
            summary: Update asset
            tags:
                - assets
    /api/v1/assets/{id}/identifiers:
        post:
            description: Add a tag identifier (RFID, BLE, barcode) to an existing asset
            parameters:
                - description: Asset ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: integer
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_shared.TagIdentifierRequest'
                description: Tag identifier to add
                required: true
                x-originalParamName: request
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                additionalProperties: true
                                type: object
                    description: 'data: shared.TagIdentifier'
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_errors.ErrorResponse'
                    description: Invalid request
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_errors.ErrorResponse'
                    description: Asset not found
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_errors.ErrorResponse'
                    description: Internal server error
            security:
                - BearerAuth: []
            summary: Add identifier to asset
            tags:
                - assets
    /api/v1/assets/{id}/identifiers/{identifierId}:
        delete:
            description: Remove a tag identifier from an asset
            parameters:
                - description: Asset ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: integer
                - description: Identifier ID
                  in: path
                  name: identifierId
                  required: true
                  schema:
                    type: integer
            responses:
                "202":
                    content:
                        application/json:
                            schema:
                                additionalProperties:
                                    type: boolean
                                type: object
                    description: 'deleted: true/false'
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_errors.ErrorResponse'
                    description: Invalid request
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_errors.ErrorResponse'
                    description: Asset or identifier not found
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/github_com_trakrf_platform_backend_internal_models_errors.ErrorResponse'
                    description: Internal server error
            security:
                - BearerAuth: []
            summary: Remove identifier from asset
            tags:
                - assets
    /api/v1/locations:
        get:
            description: Get a paginated list of all locations with their tag identifiers
            parameters:
                - description: 'Number of locations to return (default: 10)'
                  in: query
                  name: limit
                  schema:
                    default: 10
                    minimum: 1
                    type: integer
                - description: 'Number of locations to skip for pagination (default: 0)'
                  in: query
                  name: offset
                  schema:
                    default: 0
                    minimum: 0
                    type: integer
            responses:
                "202":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/internal_handlers_locations.ListLocationsResponse'
                    description: Paginated list of locations with metadata
