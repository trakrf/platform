        assets.UpdateAssetResponse:
            properties:
                data:
                    $ref: '#/components/schemas/asset.PublicAssetView'
            required:
                - data
            type: object
        errors.ErrorResponse:
            description: RFC 7807 Problem Details envelope. Generated clients should branch on `error.type` and `error.title`, not `error.detail`. `error.title` is a stable, machine-readable summary that does not vary between calls for the same condition. `error.detail` is the specific, human-readable cause of this particular failure and may be empty when title alone fully describes the condition.
            properties:
                error:
                    properties:
                        detail:
                            description: Specific, human-readable cause of this particular failure. May be empty when title alone fully describes the condition. Do not branch on this value.
                            type: string
                        fields:
                            items:
                                $ref: '#/components/schemas/errors.FieldError'
                            type: array
                        instance:
                            type: string
                        request_id:
                            type: string
                        status:
                            type: integer
                        title:
                            description: Stable, machine-readable summary suitable for client-side branching. Does not vary between calls for the same condition.
                            type: string
                        type:
                            enum:
                                - validation_error
                                - bad_request
                                - unauthorized
                                - forbidden
                                - not_found
                                - conflict
                                - rate_limited
                                - internal_error
                                - method_not_allowed
                                - unsupported_media_type
                                - missing_org_context
                            example: validation_error
                            type: string
                            x-extensible-enum: true
                    type: object
            required:
                - error
            type: object
        errors.FieldError:
            properties:
                code:
                    type: string
                field:
                    type: string
                message:
                    type: string
                params:
                    additionalProperties: {}
                    type: object
            required:
                - field
                - code
                - message
            type: object
        location.CreateLocationWithTagsRequest:
