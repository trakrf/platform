        Tag:
            description: 'Polymorphic identifier attached to an asset or location. The `tag_type` discriminator selects one of three kinds: `rfid` (RFID transponder), `ble` (Bluetooth Low Energy beacon), or `barcode` (1D/2D barcode). The `/assets/{asset_id}/tags` and `/locations/{location_id}/tags` subresources accept and return all three kinds; `tag_type` together with `value` form the natural key (a tag value is unique within its kind, not across kinds).'
            properties:
                id:
                    format: int32
                    readOnly: true
                    type: integer
                tag_type:
                    $ref: '#/components/schemas/TagType'
                value:
                    maxLength: 255
                    minLength: 1
                    pattern: ^[^\x00-\x08\x0B\x0C\x0E-\x1F\x7F]*$
                    type: string
            required:
                - id
                - tag_type
                - value
            type: object
        TagRequest:
            additionalProperties: false
            description: 'Polymorphic identifier attached to an asset or location. The `tag_type` discriminator selects one of three kinds: `rfid` (RFID transponder), `ble` (Bluetooth Low Energy beacon), or `barcode` (1D/2D barcode). The `/assets/{asset_id}/tags` and `/locations/{location_id}/tags` subresources accept and return all three kinds; `tag_type` together with `value` form the natural key (a tag value is unique within its kind, not across kinds).'
            properties:
                tag_type:
                    allOf:
                        - $ref: '#/components/schemas/TagType'
                    default: rfid
                    nullable: true
                    type: string
                value:
                    maxLength: 255
                    minLength: 1
                    pattern: ^[^\x00-\x08\x0B\x0C\x0E-\x1F\x7F]*$
                    type: string
            required:
                - value
            type: object
        TagType:
            description: Discriminator for the polymorphic Tag resource. `rfid` denotes an RFID transponder, `ble` denotes a Bluetooth Low Energy beacon, and `barcode` denotes a 1D/2D barcode. Together with `value`, this forms the natural key — the same `value` may exist under different `tag_type`s without conflict.
            enum:
                - rfid
                - ble
                - barcode
            example: rfid
            type: string
            x-extensible-enum: true
