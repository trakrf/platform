                is_active:
                    type: boolean
                name:
                    type: string
                parent_external_key:
                    nullable: true
                    type: string
                parent_id:
                    nullable: true
                    type: integer
                path:
                    type: string
                tags:
                    items:
                        $ref: '#/components/schemas/shared.Tag'
                    type: array
                updated_at:
                    format: date-time
                    type: string
                valid_from:
                    format: date-time
                    type: string
                valid_to:
                    format: date-time
                    type: string
            required:
                - id
                - external_key
                - name
                - parent_id
                - parent_external_key
                - path
                - depth
                - is_active
