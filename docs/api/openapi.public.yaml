                id:
                    format: int32
                    readOnly: true
                    type: integer
                is_active:
                    type: boolean
                location_external_key:
                    nullable: true
                    type: string
                location_id:
                    format: int32
                    nullable: true
                    type: integer
                metadata:
                    additionalProperties: true
                    type: object
                name:
                    type: string
                tags:
                    description: Tags currently attached to this resource. Read-only on PATCH; mutate via POST /{resource}/{id}/tags and DELETE /{resource}/{id}/tags/{tag_id}.
                    items:
                        $ref: '#/components/schemas/Tag'
                    type: array
                updated_at:
                    example: "2025-04-29T12:34:56Z"
                    format: date-time
                    readOnly: true
                    type: string
                valid_from:
                    example: "2025-04-29T12:34:56Z"
                    format: date-time
                    type: string
                valid_to:
                    example: "2025-04-29T12:34:56Z"
                    format: date-time
                    nullable: true
                    type: string
            required:
                - id
                - external_key
                - name
                - description
                - location_id
                - location_external_key
                - metadata
                - is_active
                - valid_from
                - valid_to
                - created_at
                - updated_at
                - deleted_at
                - tags
            type: object
        CreateAssetResponse:
