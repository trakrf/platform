components:
    headers:
        Deprecation:
            description: RFC 8594 deprecation indicator. Either the literal value `true` or an HTTP-date marking when the endpoint became deprecated. Present on every response from a deprecated endpoint until the sunset date.
            schema:
                type: string
        RetryAfter:
            description: Seconds to wait before retrying.
            schema:
                type: integer
        Sunset:
            description: RFC 8594 sunset date. HTTP-date marking when the endpoint will stop responding (200 series replaced by 410 Gone). Pairs with Deprecation; appears on every response from a deprecated endpoint.
            schema:
                format: http-date
                type: string
        WWWAuthenticate:
            description: RFC 7235 authentication challenge. Always `Bearer realm="trakrf-api"` on 401 responses.
            schema:
                type: string
        XRateLimitLimit:
            description: Steady-state requests/min for this API key.
            schema:
                type: integer
        XRateLimitRemaining:
            description: Requests remaining before throttling; bounded by X-RateLimit-Limit.
            schema:
                type: integer
        XRateLimitReset:
            description: Unix timestamp (seconds) when X-RateLimit-Remaining will next equal X-RateLimit-Limit.
            schema:
                type: integer
        XRequestId:
            description: Server-assigned request correlation identifier; mirrored as error.request_id in error envelopes and echoed in server logs. Quote this when filing support tickets.
            schema:
                type: string
    responses:
        Gone:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
            description: Endpoint sunset. The endpoint was deprecated and has now passed its Sunset date; clients should migrate to the documented replacement (RFC 8594).
        MethodNotAllowed:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
            description: Method not allowed
            headers:
                Allow:
                    description: Comma-separated list of HTTP methods supported on this resource (RFC 7231 §6.5.5).
                    schema:
                        type: string
    schemas:
        AddAssetTagResponse:
            properties:
                data:
                    $ref: '#/components/schemas/Tag'
            required:
                - data
            type: object
        AddLocationTagResponse:
            properties:
                data:
                    $ref: '#/components/schemas/Tag'
            required:
                - data
            type: object
        AssetHistoryItem:
            properties:
                duration_seconds:
                    format: int32
                    nullable: true
                    type: integer
                location_external_key:
                    nullable: true
                    type: string
                location_id:
                    format: int32
                    nullable: true
                    type: integer
                timestamp:
                    example: "2025-04-29T12:34:56Z"
                    format: date-time
                    type: string
            required:
                - timestamp
                - location_id
                - location_external_key
                - duration_seconds
            type: object
        AssetHistoryResponse:
            properties:
                data:
                    items:
                        $ref: '#/components/schemas/AssetHistoryItem'
                    type: array
                limit:
                    example: 50
                    format: int32
                    type: integer
                offset:
                    example: 0
                    format: int32
                    type: integer
                total_count:
                    example: 100
                    format: int32
                    type: integer
            required:
                - data
                - limit
                - offset
                - total_count
            type: object
        AssetLocationItem:
            properties:
                asset_deleted_at:
                    example: "2025-04-29T12:34:56Z"
                    format: date-time
                    nullable: true
                    readOnly: true
                    type: string
                asset_external_key:
                    nullable: true
                    type: string
                asset_id:
                    format: int32
                    nullable: true
                    type: integer
                last_seen:
                    example: "2025-04-29T12:34:56Z"
                    format: date-time
                    type: string
                location_external_key:
                    nullable: true
                    type: string
                location_id:
                    format: int32
                    nullable: true
                    type: integer
            required:
                - asset_id
                - asset_external_key
                - location_id
                - location_external_key
                - last_seen
                - asset_deleted_at
            type: object
        AssetLocationsResponse:
            properties:
                data:
                    items:
                        $ref: '#/components/schemas/AssetLocationItem'
