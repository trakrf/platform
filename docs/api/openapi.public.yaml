                    type: string
                external_key:
                    maxLength: 255
                    type: string
                is_active:
                    example: true
                    type: boolean
                metadata:
                    additionalProperties: true
                    type: object
                name:
                    maxLength: 255
                    minLength: 1
                    type: string
                tags:
                    items:
                        $ref: '#/components/schemas/shared.TagRequest'
                    type: array
                valid_from:
                    example: "2025-01-01T00:00:00Z"
                    format: date-time
                    type: string
                valid_to:
                    example: "2026-01-01T00:00:00Z"
                    format: date-time
                    type: string
            required:
                - name
            type: object
        asset.PublicAssetView:
