    securitySchemes:
        APIKey:
            bearerFormat: JWT
            description: 'TrakRF API key (JWT). Format: "Bearer <jwt>". Mint keys from the API Keys section of your TrakRF account.'
            scheme: bearer
            type: http
info:
    contact:
        email: support@trakrf.id
        name: TrakRF Support
    description: TrakRF public REST API. See docs.trakrf.id/api for the customer-facing reference.
    license:
        name: Business Source License 1.1
        url: https://github.com/trakrf/platform/blob/main/LICENSE
    title: TrakRF API
    version: v1
openapi: 3.0.3
paths:
    /api/v1/assets:
        get:
            description: Paginated assets list with natural-key filters, sort, and substring search
            operationId: assets.list
            parameters:
                - description: max 200
                  in: query
                  name: limit
                  schema:
                    default: 50
                    type: integer
                - description: min 0
                  in: query
                  name: offset
                  schema:
                    default: 0
                    type: integer
                - description: filter by current location id (canonical, may repeat)
                  in: query
                  name: location_id
                  schema:
                    type: integer
                - description: filter by current location external_key (may repeat)
                  in: query
                  name: location_external_key
                  schema:
                    type: string
                - description: filter by active flag
                  in: query
                  name: is_active
                  schema:
                    type: boolean
                - description: substring search (case-insensitive) on name, external_key, description, and active tag values
                  in: query
                  name: q
                  schema:
                    type: string
                - description: comma-separated; prefix '-' for DESC
                  explode: false
                  in: query
                  name: sort
                  schema:
                    items:
                        enum:
                            - external_key
                            - -external_key
                            - name
                            - -name
                            - created_at
                            - -created_at
                            - updated_at
                            - -updated_at
                        type: string
                    type: array
                  style: form
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/assets.ListAssetsResponse'
                    description: OK
                    headers:
                        X-RateLimit-Limit:
                            description: Steady-state requests/min for this API key
                            schema:
                                type: integer
                        X-RateLimit-Remaining:
                            description: Requests remaining before throttling; bounded by X-RateLimit-Limit
                            schema:
                                type: integer
                        X-RateLimit-Reset:
                            description: Unix timestamp (seconds) when X-RateLimit-Remaining will next equal X-RateLimit-Limit
                            schema:
                                type: integer
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: Bad Request
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: Unauthorized
                "403":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: Forbidden
                "429":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: rate_limited
                    headers:
                        Retry-After:
                            description: Seconds to wait before retrying
                            schema:
                                type: integer
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: Internal Server Error
            security:
                - APIKey:
                    - assets:read
            summary: List assets
            tags:
                - assets
        post:
            description: |-
                Create a new asset record, optionally with one or more tags (RFID, BLE, NFC, barcode).

                The `external_key` field is optional. Provide a value from your system of record
                (ERP, WMS, asset management) for natural-key joins, or omit it to receive a
                server-assigned external_key in the format `ASSET-NNNN` (per-organization sequence).
                A caller-supplied external_key that collides with an existing asset returns 409.

                Returns the created asset with its assigned tags. The Location response header contains the canonical URL.
            operationId: assets.create
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/asset.CreateAssetWithTagsRequest'
                description: Asset to create with optional tags
                required: true
                x-originalParamName: request
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/assets.CreateAssetResponse'
                    description: Created
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: bad_request
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: unauthorized
                "403":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: forbidden
                "409":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: conflict
                "429":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: rate_limited
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: internal_error
            security:
                - APIKey:
                    - assets:write
            summary: Create an asset
            tags:
                - assets
    /api/v1/assets/{asset_id}/tags/{tag_id}:
        delete:
            description: Detach a tag from an asset by its tag record id.
            operationId: assets.tags.remove
            parameters:
                - description: Asset id (canonical)
                  in: path
                  name: asset_id
                  required: true
                  schema:
                    type: integer
                - description: Tag id
                  in: path
                  name: tag_id
                  required: true
                  schema:
                    type: integer
            responses:
                "204":
                    description: deleted
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: bad_request
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: unauthorized
                "403":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: forbidden
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: not_found
                "429":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: rate_limited
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: internal_error
            security:
                - APIKey:
                    - assets:write
            summary: Remove a tag from an asset
            tags:
                - assets
    /api/v1/assets/{id}:
        delete:
            description: Delete an asset by its canonical id. The asset is removed from all subsequent queries and its external_key becomes immediately available for reuse. Returns 204 on success, 404 if the asset does not exist or has already been deleted.
            operationId: assets.delete
            parameters:
                - description: Asset id (canonical)
                  in: path
                  name: id
                  required: true
                  schema:
                    type: integer
            responses:
                "204":
                    description: deleted
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: unauthorized
                "403":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: forbidden
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: not_found
                "429":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: rate_limited
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: internal_error
            security:
                - APIKey:
                    - assets:write
            summary: Delete an asset
            tags:
                - assets
        get:
            description: Retrieve an asset by its canonical id. Returns 404 if the asset does not exist.
            operationId: assets.get
            parameters:
                - description: Asset id (canonical)
                  in: path
                  name: id
                  required: true
                  schema:
                    type: integer
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/assets.GetAssetResponse'
                    description: OK
                    headers:
                        X-RateLimit-Limit:
                            description: Steady-state requests/min for this API key
                            schema:
                                type: integer
                        X-RateLimit-Remaining:
                            description: Requests remaining before throttling; bounded by X-RateLimit-Limit
                            schema:
                                type: integer
                        X-RateLimit-Reset:
                            description: Unix timestamp (seconds) when X-RateLimit-Remaining will next equal X-RateLimit-Limit
                            schema:
                                type: integer
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: Bad Request
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: Unauthorized
                "403":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: Forbidden
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: Not Found
                "429":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: rate_limited
                    headers:
                        Retry-After:
                            description: Seconds to wait before retrying
                            schema:
                                type: integer
            security:
                - APIKey:
                    - assets:read
            summary: Get asset by canonical id
            tags:
                - assets
        put:
            description: Update mutable fields on an existing asset. Only fields included in the request body are changed.
            operationId: assets.update
            parameters:
                - description: Asset id (canonical)
                  in: path
                  name: id
                  required: true
                  schema:
                    type: integer
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/asset.UpdateAssetRequest'
                description: Fields to update
                required: true
                x-originalParamName: request
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/assets.UpdateAssetResponse'
                    description: OK
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: bad_request
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: unauthorized
                "403":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: forbidden
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/errors.ErrorResponse'
                    description: not_found
                "409":
                    content:
                        application/json:
