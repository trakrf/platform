name: Contract Tests Gate

# Deferred-blocking gate for the Schemathesis contract-tests suite. The per-PR
# `Contract Tests` workflow is advisory; this workflow is the required check.
#
# How it works
# ============
#
# On every pull_request event, this job queries the latest push-event
# `Contract Tests` run against `main` and exits per the result:
#
#   * `completed` + `success`  →  pass (most PRs hit this immediately)
#   * `completed` + anything else  →  fail. Main is broken; fix-forward in a
#     follow-up PR. Admin-merge the fix PR to bypass this gate on it.
#   * still `in_progress` / `queued` →  poll up to ~8 minutes. If main's run
#     resolves green within that window, pass. If it resolves red, fail. If
#     the timeout elapses with main still in flight, fail (the PR can be
#     re-run after main resolves).
#   * no runs yet at all  →  pass with a warning (first-time deploy
#     bootstrap; manually trigger one push-event run via `gh workflow run`).
#
# Cycle-time impact
# =================
#
# The bulk of `Contract Tests` runtime (~5 min, dominated by the Schemathesis
# Coverage phase) is paid asynchronously after merge rather than synchronously
# during PR review. Net effect by PR-merge cadence:
#
#   * First PR after main is green: gate finishes in <30s.
#   * Back-to-back PR opened while main's post-merge run is still in flight:
#     gate polls and waits for that run (up to ~5 min). User accepted this
#     trade-off explicitly: "willing to accept a 6 minute cycle time for the
#     second PR in a back to back sequence, but not the first PR."
#
# In exchange, the per-PR Contract Tests job no longer blocks merge, removing
# the ~5 min wall from every PR's cycle time.
#
# Why not nightly cron?
# ====================
#
# Nightly cron was considered and rejected. The cron's value-add over this
# gate is "alert via a separate channel within 24h" — but the merger (solo
# pre-launch dev) wouldn't open the email/Slack until the next PR opens
# anyway. This at-merge gate is sharper: red main blocks the next merge
# immediately, no out-of-band signal needed.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  actions: read
  contents: read

concurrency:
  group: contract-tests-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  main-status:
    name: main contract-tests must be green
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Look back at main's last contract-tests run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # 8 min covers worst-case main run (~5 min Schemathesis + ~1 min CI
          # overhead) plus margin. If main is still in-flight after this we
          # fail rather than burn another runner-hour holding the gate open.
          MAX_WAIT_SECONDS=480
          POLL_INTERVAL=15
          deadline=$(( $(date +%s) + MAX_WAIT_SECONDS ))

          while :; do
            run_json=$(gh run list \
              --workflow=contract-tests.yml \
              --branch=main \
              --event=push \
              --limit=1 \
              --json status,conclusion,databaseId,url,createdAt,headSha)

            if [ "$run_json" = "[]" ]; then
              echo "::warning::No push-event Contract Tests run exists for main yet."
              echo "::warning::This is expected on first deployment of this gate workflow."
              echo "::warning::Bootstrap with: gh workflow run contract-tests.yml --ref main"
              echo "::warning::Allowing this PR through without lookback."
              exit 0
            fi

            status=$(echo "$run_json" | jq -r '.[0].status')
            conclusion=$(echo "$run_json" | jq -r '.[0].conclusion')
            url=$(echo "$run_json" | jq -r '.[0].url')
            head_sha=$(echo "$run_json" | jq -r '.[0].headSha')
            short_sha=${head_sha:0:7}

            case "$status" in
              completed)
                if [ "$conclusion" = "success" ]; then
                  echo "✅ Main's latest Contract Tests run is green (sha=${short_sha})"
                  echo "   $url"
                  exit 0
                fi
                echo "::error::Main's latest Contract Tests run is ${conclusion} (sha=${short_sha})"
                echo "::error::Fix-forward in a follow-up PR before merging this one."
                echo "::error::Admin-merge the fix PR to bypass this gate on the fix itself."
                echo "::error::${url}"
                exit 1
                ;;
              *)
                now=$(date +%s)
                if [ "$now" -ge "$deadline" ]; then
                  echo "::error::Main's Contract Tests is still '${status}' after ${MAX_WAIT_SECONDS}s (sha=${short_sha})"
                  echo "::error::Re-run this check once main resolves."
                  echo "::error::${url}"
                  exit 1
                fi
                remaining=$(( deadline - now ))
                echo "⏳ Main's Contract Tests is ${status} (sha=${short_sha}, ${remaining}s remaining before timeout)"
                echo "   ${url}"
                sleep $POLL_INTERVAL
                ;;
            esac
          done
