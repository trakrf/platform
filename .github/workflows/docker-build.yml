name: Docker Build and Push

on:
  pull_request:
  push:
    # `preview` is the PR-stacked composition built by sync-preview.yml. It is
    # force-rewritten on every PR open/sync/close, so expect frequent builds —
    # intended. Each push publishes two tags:
    #   - `ghcr.io/trakrf/backend:sha-<short>`  — immutable, for traceability
    #   - `ghcr.io/trakrf/backend:preview`      — floating, for the GKE
    #     auto-track (TRA-483, ArgoCD Image Updater w/ digest strategy)
    # The `latest` tag stays gated on the default branch; the floating
    # `preview` tag is gated on `refs/heads/preview`. Prod uses semver tags
    # — no path for `preview` to promote into a stable ref.
    branches: [main, preview]

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write

jobs:
  # Detect whether the ingester image needs rebuilding. The ingester is an
  # independent service whose build context is just ingester/; most PRs never
  # touch it, so rebuilding it on every PR only burns CI minutes and exposes
  # the build to the Docker Hub anonymous pull-rate limit (toomanyrequests).
  changes:
    runs-on: ubuntu-latest
    outputs:
      ingester: ${{ steps.filter.outputs.ingester }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ingester:
              - 'ingester/**'

  build:
    needs: changes
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            context: .
            dockerfile: ./Dockerfile
            target: production
          - image: ingester
            context: ./ingester
            dockerfile: ./ingester/Dockerfile
            target: ''
    name: build-${{ matrix.image }}
    # The backend image is rebuilt for every change (its build context is the
    # whole repo). The ingester image is rebuilt only when ingester/** changed,
    # or on a push to main (so main always produces a complete set of image
    # tags for deploys). When skipped, build-<image> still runs as a fast
    # no-op so the check is reported.
    env:
      should_build: ${{ matrix.image != 'ingester' || needs.changes.outputs.ingester == 'true' || github.event_name == 'push' }}
    steps:
      - name: Checkout
        if: env.should_build == 'true'
        uses: actions/checkout@v4
        with:
          # Full history + tags so `git describe` can resolve the platform
          # version (TRA-485). Shallow clones drop tag refs and ancestor
          # commits, leaving describe with nothing to report.
          fetch-depth: 0

      - name: Compute platform version
        if: env.should_build == 'true' && matrix.image == 'backend'
        id: version
        run: |
          version=$(git describe --tags --always --dirty)
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Platform version: ${version}"

      - name: Set up Buildx
        if: env.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.should_build == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: env.should_build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/trakrf/${{ matrix.image }}
          # `preview` is given priority=50 (below `sha`'s default 100) so the
          # immutable `sha-<short>` remains the primary version output — that
          # keeps BUILD_TAG/VITE_BUILD_TAG pinned to a real commit instead of
          # the floating label, so /health and /version.json stay honest.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=preview,enable=${{ github.ref == 'refs/heads/preview' }},priority=50
            type=sha,prefix=sha-,format=short

      - name: Build and push
        if: env.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          # Inject build metadata so /health and frontend /version.json report
          # the deployed commit. BUILD_TAG uses the primary ref tag produced
          # by metadata-action (sha-xxxx on commits, latest on default branch).
          # Dockerfile propagates these to the frontend stage as VITE_* env.
          # VITE_ENVIRONMENT bakes the env-banner label into the bundle:
          # semver tags ship empty (prod, no banner), everything else is "preview".
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            BUILD_TAG=${{ steps.meta.outputs.version }}
            APP_VERSION=${{ steps.version.outputs.version }}
            VITE_ENVIRONMENT=${{ startsWith(github.ref, 'refs/tags/v') && '' || 'preview' }}
