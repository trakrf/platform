name: API Spec

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'docs/api/**'
      - '.spectral.yaml'
      - 'functions/**'
      - '.github/workflows/api-spec.yml'
  push:
    branches: [main]

concurrency:
  group: api-spec-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  api-spec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install swag CLI
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.6

      - name: Stub backend/frontend/dist (satisfies go:embed in main.go during swag parse)
        run: |
          mkdir -p backend/frontend/dist
          echo "stub for CI" > backend/frontend/dist/index.html

      - name: Regenerate public + internal specs
        run: just backend api-spec

      - name: Drift check — committed public spec must match regeneration
        # Only the OpenAPI JSON/YAML are checked for drift. The Postman collection
        # is not committed to this repo — openapi-to-postmanv2 regenerates UUIDs
        # on every run, so the collection is always "drifted" by design. It is
        # generated downstream by trakrf/docs's scripts/refresh-openapi.sh, which
        # pulls openapi.public.{json,yaml} from this repo and regenerates the
        # Postman collection there.
        run: |
          if ! git diff --exit-code docs/api/openapi.public.json docs/api/openapi.public.yaml; then
            echo "::error::docs/api/openapi.public.{json,yaml} is stale. Run 'just backend api-spec' locally and commit the result."
            exit 1
          fi

      - name: Redocly lint
        run: pnpm --package=@redocly/cli dlx redocly lint docs/api/openapi.public.yaml --extends=recommended

      - name: Install workspace deps (Spectral + ruleset resolution)
        # Spectral resolves `extends` strings against node_modules adjacent to
        # the ruleset file. `pnpm dlx` won't surface @baloise/spectral-rules to
        # the workspace root, so the package must be installed locally.
        run: pnpm install --frozen-lockfile

      - name: Spectral lint (Zalando + TrakRF custom rules)
        # Blocking as of TRA-678 — Phase-3 fix-wave (TRA-672..677) drove findings to zero.
        # See .spectral.yaml for rule traceability to historical BB findings (BB13/BB16/BB18/BB27).
        run: pnpm exec spectral lint docs/api/openapi.public.yaml --ruleset .spectral.yaml --format pretty

      - name: openapi-generator-cli validate — structural contract check for codegen consumers
        # Redocly catches style/semantic issues; openapi-generator-cli catches the
        # specific constraints SDK generators enforce (referenced schemas resolve,
        # security-scheme names match types, path params are declared, etc.).
        # Running both keeps TRA-480-class contract gaps from landing again.
        run: pnpm --package=@openapitools/openapi-generator-cli dlx openapi-generator-cli validate -i docs/api/openapi.public.yaml

      - name: Upload specs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-specs
          path: |
            docs/api/openapi.public.json
            docs/api/openapi.public.yaml
          retention-days: 7
