name: Contract Tests

# Pull-request runs are advisory: the job reports a status but is NOT a
# required check (branch protection lists `contract-tests-gate` instead, which
# looks back at main's latest contract-tests result rather than waiting on
# this run). This removes the ~5 min Coverage-phase wall-clock from per-PR
# cycle time without dropping the underlying signal — see
# .github/workflows/contract-tests-gate.yml for the deferred-blocking pattern.
#
# Push-to-main runs are the authoritative result: after a merge, contract
# tests run against the resolved main state, and the next PR's gate reads
# that conclusion. Cycle time on the merge itself is unaffected because the
# job runs asynchronously; the cost lands at "open the next PR" if main
# turned red.
on:
  pull_request:
    paths:
      - 'backend/**'
      - 'docs/api/openapi.public.yaml'
      - '.github/workflows/contract-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/api/openapi.public.yaml'
      - '.github/workflows/contract-tests.yml'

concurrency:
  group: contract-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  schemathesis:
    runs-on: ubuntu-latest
    env:
      # Test-only secrets. The recipe defaults to these same values when unset;
      # pinning them explicitly here signals intent and keeps local + CI parity.
      POSTGRES_PASSWORD: postgres
      JWT_SECRET: dev-secret-change-in-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Pre-pull Schemathesis image
        # Warms the docker cache and surfaces registry/auth/rate-limit issues
        # in their own step rather than failing inside `just test-contract`.
        run: docker pull schemathesis/schemathesis:4.18.2

      - name: Stub go:embed targets (frontend/dist + swaggerspec)
        # `just migrate` and the backend itself compile main.go and
        # internal/handlers/swaggerspec, both of which use //go:embed. CI
        # doesn't build the frontend or run swag/apispec for this gate (we'd
        # be paying that cost on every PR just to satisfy the compiler), so
        # stub the targets with minimal placeholder files. The contract test
        # never serves /static or /swagger/openapi.internal.json — the public
        # spec at docs/api/openapi.public.yaml is mounted directly into the
        # Schemathesis container.
        run: |
          mkdir -p backend/frontend/dist
          touch backend/frontend/dist/.placeholder
          : > backend/frontend/dist/index.html
          : > backend/internal/handlers/swaggerspec/openapi.internal.json
          : > backend/internal/handlers/swaggerspec/openapi.internal.yaml
          : > backend/internal/handlers/swaggerspec/openapi.public.json
          : > backend/internal/handlers/swaggerspec/openapi.public.yaml

      - name: Run contract tests
        # Authoritative on push-to-main, advisory on pull_request. The
        # contract-tests-gate workflow is the required check on PRs; it reads
        # this job's latest conclusion on main and fails fast if main is red
        # or still in-flight. See contract-tests-gate.yml for rationale.
        run: just test-contract

      - name: Upload Schemathesis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schemathesis-reports
          path: backend/contract-tests/
          if-no-files-found: warn
          retention-days: 7
