name: Contract Tests

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'docs/api/openapi.public.yaml'
      - '.github/workflows/contract-tests.yml'

concurrency:
  group: contract-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  schemathesis:
    runs-on: ubuntu-latest
    env:
      # Test-only secrets. The recipe defaults to these same values when unset;
      # pinning them explicitly here signals intent and keeps local + CI parity.
      POSTGRES_PASSWORD: postgres
      JWT_SECRET: dev-secret-change-in-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Pre-pull Schemathesis image
        # Warms the docker cache and surfaces registry/auth/rate-limit issues
        # in their own step rather than failing inside `just test-contract`.
        run: docker pull schemathesis/schemathesis:4.18.2

      - name: Run contract tests
        # Non-blocking initially per TRA-671: the spec is expected to be red
        # against the live API on introduction. Phase-3 (TRA-669) will green
        # the findings, at which point `continue-on-error` should be removed
        # in the same PR that lands the fixes. Mirrors the Spectral posture
        # in .github/workflows/api-spec.yml.
        continue-on-error: true
        run: just test-contract

      - name: Upload Schemathesis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schemathesis-reports
          path: backend/contract-tests/
          if-no-files-found: warn
          retention-days: 7
