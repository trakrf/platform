# TrakRF OpenAPI lint config — Spectral
#
# Scope:
#   Lints docs/api/openapi.public.yaml (generated from Go swag annotations).
#   Runs in CI via .github/workflows/api-spec.yml after Redocly lint.
#
# Baseline:
#   - spectral:oas                              — structural OpenAPI 3.x rules from Stoplight
#   - @baloise/spectral-rules/zalando.yml       — Zalando RESTful API Guidelines port
#     (the bare package main is the baloise flavor; we want pure Zalando)
#
# Disabled inherited rules are listed below with a one-line rationale,
# mirroring the convention in redocly.yaml.
#
# Custom rules (trakrf-*) trace to specific BB findings. See TRA-670 for the
# origin of each rule.

extends:
  - spectral:oas
  - "@baloise/spectral-rules/zalando.yml"

rules:
  # ─────────────────────────────────────────────────────────────
  # Inherited Zalando disables (intentional architectural choices)
  # ─────────────────────────────────────────────────────────────
  # Custom trakrf-* rules will be appended below in Tasks 4-8.

  # URL-segment versioning (/api/v1/...) — Zalando recommends media-type
  # versioning, but TrakRF ships URL versioning for discoverability and
  # tooling compatibility. Settled architectural choice.
  must-not-use-uri-versioning: off
  should-not-use-api-as-base-path: off

  # Problem+JSON (RFC 7807) error envelope — Zalando mandates it; TrakRF
  # ships a custom ErrorResponse envelope ({code, message, request_id, details}).
  # Settled architectural choice; documented in API design docs.
  must-use-problem-json-for-errors: off

  # Zalando-internal API metadata (x-api-id, x-audience) — Zalando's
  # internal API registry conventions. TrakRF has no equivalent registry
  # or audience taxonomy. Not OpenAPI-standard.
  must-have-info-x-api-id: off
  must-provide-api-audience: off

  # Zalando-proprietary x-extensible-enum extension — not OpenAPI-standard;
  # TrakRF uses plain enums and accepts the forward-compatibility tradeoff.
  should-use-x-extensible-enum: off
