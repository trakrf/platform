# TrakRF OpenAPI lint config — Spectral
#
# Scope:
#   Lints docs/api/openapi.public.yaml (generated from Go swag annotations).
#   Runs in CI via .github/workflows/api-spec.yml after Redocly lint.
#
# Baseline:
#   - spectral:oas                              — structural OpenAPI 3.x rules from Stoplight
#   - @baloise/spectral-rules/zalando.yml       — Zalando RESTful API Guidelines port
#     (the bare package main is the baloise flavor; we want pure Zalando)
#
# Disabled inherited rules are listed below with a one-line rationale,
# mirroring the convention in redocly.yaml.
#
# Custom rules (trakrf-*) trace to specific BB findings. See TRA-670 for the
# origin of each rule.

extends:
  - spectral:oas
  - "@baloise/spectral-rules/zalando.yml"

rules:
  # ─────────────────────────────────────────────────────────────
  # Inherited Zalando disables (intentional architectural choices)
  # ─────────────────────────────────────────────────────────────
  # Custom trakrf-* rules follow below.

  # URL versioning + /api base path — Zalando recommends media-type
  # versioning and discourages `/api` as a base-path prefix. TrakRF ships
  # `/api/v1/...` for both reasons: URL versioning is discoverable and
  # broadly tool-compatible, and the `/api` prefix scopes the surface
  # away from non-API routes. Settled architectural choice.
  must-not-use-uri-versioning: off
  should-not-use-api-as-base-path: off

  # Problem+JSON (RFC 7807) error envelope — Zalando mandates it; TrakRF
  # ships a custom ErrorResponse envelope ({code, message, request_id,
  # details}). Settled architectural choice.
  must-use-problem-json-for-errors: off

  # Zalando-internal API metadata (x-api-id, x-audience) — Zalando's
  # internal API registry conventions. TrakRF has no equivalent registry
  # or audience taxonomy. Not OpenAPI-standard.
  must-have-info-x-api-id: off
  must-provide-api-audience: off

  # Zalando-proprietary x-extensible-enum extension — not OpenAPI-standard;
  # TrakRF uses plain enums and accepts the forward-compatibility tradeoff.
  should-use-x-extensible-enum: off

  # ─────────────────────────────────────────────────────────────
  # Custom TrakRF rules (trakrf-*)
  # ─────────────────────────────────────────────────────────────

  trakrf-int4-bounded-id-path-params:
    description: >
      Path parameters named like `*_id` (or bare `id`) must declare
      `format: int32` and `maximum: 2147483647`. Origin: BB27 F1/S1 — the
      spec previously declared int64 bounds on int4-backed columns, which
      triggered 500s with the raw pgx driver error in the response body.
      Spec numeric bounds must match int4 storage.
    message: "*_id path params must declare format:int32 AND maximum:2147483647 — int4 storage overflow (BB27 F1/S1)"
    severity: error
    # NOTE for future rule authors: Spectral uses the nimma JSONPath engine for
    # `given` evaluation. nimma does NOT support `=~` (jsonpath-plus regex
    # operator). Use `.match(/<pattern>/)` method syntax instead, as below.
    given:
      # Operation-level path params (all current params are at this level)
      - "$.paths.*.*.parameters[?(@.in == 'path' && (@.name == 'id' || @.name.match(/_id$/)))].schema"
      # Path-item-level path params (defensive coverage in case any are added here)
      - "$.paths.*.parameters[?(@.in == 'path' && (@.name == 'id' || @.name.match(/_id$/)))].schema"
    then:
      - function: schema
        functionOptions:
          schema:
            type: object
            properties:
              format:
                const: int32
              maximum:
                const: 2147483647
            required:
              - format
              - maximum
