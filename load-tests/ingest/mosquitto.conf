# Local ingestion load-test broker — plaintext, anonymous. NOT for production.
# The CS463 reader (192.168.50.212) publishes here over plain MQTT to
# 192.168.50.203:1883; the backend subscribes container-to-container at
# mosquitto:1883. QoS-0 end-to-end (reader publishes QoS 0).
listener 1883 0.0.0.0
allow_anonymous true

# Publish $SYS broker stats every 2s so we can sample message throughput
# (messages received/sent) as the reader-emit-rate proxy.
sys_interval 2

# Generous queue so the broker isn't the limiter; QoS-0 still drops to a slow
# subscriber, which is exactly the backend-cliff behavior we want to observe.
max_queued_messages 1000000
persistence false
